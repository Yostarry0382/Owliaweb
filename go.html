<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Owlia - リダイレクト中…</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Noto Sans JP', sans-serif;
      background: linear-gradient(135deg, #f0f8fa, #e8f4f7);
      color: #1a2d32;
    }
    .box {
      text-align: center;
      padding: 40px;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #b8dde6;
      border-top-color: #1a6b7c;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .msg { font-size: 14px; color: #5a6e74; }
    .fallback { margin-top: 20px; display: none; }
    .fallback a {
      color: #1a6b7c;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="spinner"></div>
    <div class="msg">リダイレクト中…</div>
    <div class="fallback" id="fallback">
      <p>自動でリダイレクトされない場合は<br><a id="fallbackLink" href="#">こちら</a>をクリックしてください。</p>
    </div>
  </div>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var app = params.get('app') || '';
      var url = params.get('url') || '';

      // Log click to server API
      if (app) {
        try {
          fetch('api/clicks.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ app: app }),
          }).catch(function () {});
        } catch (e) {}
      }

      // Redirect
      if (url && url !== '#') {
        document.getElementById('fallbackLink').href = url;
        setTimeout(function () {
          document.getElementById('fallback').style.display = 'block';
        }, 3000);
        window.location.replace(url);
      } else {
        // No real URL - go back to landing page
        document.querySelector('.msg').textContent = 'リンク先は現在準備中です。トップページに戻ります…';
        setTimeout(function () {
          window.location.replace('index.html');
        }, 2000);
      }
    })();
  </script>
</body>
</html>
